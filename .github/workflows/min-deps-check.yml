name: Min Dependency Tests

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  min-deps:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
      
      - name: Create virtual environment
        run: uv venv

      - name: Install minimum dependencies
        run: |
          uv pip install \
            --resolution=lowest-direct \
            -e ".[dev,lint,eth]"
      
      - name: Show resolved core dependency versions
        run: |
          echo "Resolved core dependency versions:"
          uv pip list | grep -E '^(protobuf|grpcio|cryptography|requests|pycryptodome|eth-abi|python-dotenv)\s'

      - name: Generate Proto Files
        run: |
          uv run python generate_proto.py

      - name: Run unit tests (min deps)
        run: |
          uv run pytest tests/unit -v
