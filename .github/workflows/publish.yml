name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: hl-sdk-py-lin-md
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Upgrade pip
        run: pip install "pip==26.0.1"

      # Dependency versions are pinned to ensure reproducible builds.
      # These should be periodically reviewed and updated for ensuring smooth execution.
      - name: Install build, pdm-backend, and grpcio-tools
        run: pip install build==1.5 pdm-backend==2.4.8 grpcio-tools==1.76.0

      - name: Generate Protobuf
        run: python generate_proto.py

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate build provenance attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-and-sign:
    name: Publish and sign release artifacts
    needs: build
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    runs-on: hl-sdk-py-lin-md
    environment:
      name: pypi
      url: https://pypi.org/p/hiero-sdk-python
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Sign release distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
          verify: true
          verify-cert-identity: https://github.com/${{ github.repository }}/.github/workflows/publish.yml@refs/tags/${{ github.ref_name }}
          verify-oidc-issuer: https://token.actions.githubusercontent.com

      - name: Prepare distributions for PyPI upload
        run: |
          mkdir -p publish-dist
          cp dist/*.whl publish-dist/
          cp dist/*.tar.gz publish-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: publish-dist
          skip-existing: true
          attestations: true

      - name: Upload signed assets to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: |
            ## Important notes
            - See https://github.com/hiero-ledger/hiero-sdk-python/milestones for the pull requests included in this milestone.
            - This release includes auto-generated release notes.
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore.json
          fail_on_unmatched_files: true
          generate_release_notes: true
