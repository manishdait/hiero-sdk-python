# This workflow automatically closes pull requests without a linked issue after 1 day.

name: Linked Issue Enforcer

on:
  schedule:
    - cron: "0 2 * * *" # Every day at 2:00 AM
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, do not post comments (dry run). Accepts "true" or "false". Default true for manual runs.'
        required: false
        default: "true"

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-linked-issue-checker:
    runs-on: hl-sdk-py-lin-md
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - name: Enforce linked issues on PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ env.DRY_RUN }}
          HOURS_BEFORE_CLOSE: "24"
          REQUIRE_AUTHOR_ASSIGNED: "true"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          script: |
            const script = require('./.github/scripts/cron-enforcer-pr-linked-issue.js');
            await script({ github, context});
