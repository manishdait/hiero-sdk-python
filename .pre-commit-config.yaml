repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.0
  hooks:
  - id: gitleaks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.9
  hooks:
    - id: ruff-check
    - id: ruff-format
- repo: https://github.com/PyCQA/bandit
  rev: 1.9.4
  hooks:
  - id: bandit
    files: ^(src|tck)/
    verbose: true
    entry: |
          bash -c '
          output=$(bandit -c bandit.yml -l --exit-zero --format screen "$@")
          echo "$output"
          if echo "$output" | grep -qE "Severity: (Medium|High)"; then
              echo -e "\n\033[1;31m[ERROR] Bandit found Medium or High severity issues. Commit blocked!\033[0m"
              exit 1
          fi
          ' --
